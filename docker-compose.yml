services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: "true"
    command: vault server -dev
    # ↑ removed -dev-listen-address from here
    # address is already set via VAULT_DEV_LISTEN_ADDRESS env var

  config-service:
    build: ./Services/ConfigService
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: myroot
    depends_on:
      vault:
        condition: service_healthy
