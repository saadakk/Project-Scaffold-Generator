global:
  scrape_interval: 15s
  # every 15 seconds prometheus calls the targets below
  # and collects all metrics

  evaluation_interval: 15s
  # every 15 seconds evaluate alerting rules

scrape_configs:

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    # prometheus scrapes metrics FROM otel-collector
    # otel-collector already received them from your services
    # this is why your services don't need to expose
    # /actuator/prometheus directly to Prometheus

  - job_name: generate-project-service
    static_configs:
      - targets: ["generate-project-service:8080"]
    metrics_path: /actuator/prometheus
    # fallback: also scrape directly from your service
    # useful if otel-collector is down