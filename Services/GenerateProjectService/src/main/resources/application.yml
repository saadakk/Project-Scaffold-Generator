server:
  port: 8080

spring:
  application:
    name: generate-project-service
  config:
    import: optional:configserver:http://localhost:8888


eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true