server:
  port: 8222

spring:
  application:
    name: api-gateway
  config:
    import: configserver:http://config-service:8888/
  cloud:
    config:
      token: myroot
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 1000
        max-interval: 3000
        multiplier: 1.5

eureka:
  client:
    webclient:
      enabled: true
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: false
    fetch-registry: true

logging:
  level:
    ma.ms.apigateway: DEBUG