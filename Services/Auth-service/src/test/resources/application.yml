server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: configserver:http://config-service:8888/

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.config: DEBUG