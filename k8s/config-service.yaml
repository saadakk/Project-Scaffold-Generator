apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: hindelatache/config-service:latest
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_CLOUD_VAULT_HOST
              value: "vault"
            - name: SPRING_CLOUD_VAULT_PORT
              value: "8200"
            - name: SPRING_CLOUD_VAULT_SCHEME
              value: "http"
            - name: SPRING_CLOUD_VAULT_TOKEN
              value: "my-root-token"

---
apiVersion: v1
kind: Service
metadata:
  name: config-service
spec:
  selector:
    app: config-service
  ports:
    - port: 80
      targetPort: 8888
